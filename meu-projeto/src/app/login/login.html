<section class="login">
  <h2>Login</h2>

  <input
    [(ngModel)]="username"
    name="username"
    placeholder="Username"
    type="text"
  />

  <input
    [(ngModel)]="password"
    name="password"
    placeholder="Password"
    type="password"
  />

  <button (click)="login()">Entrar</button>

  @if (erro) {
    <p class="erro">{{ erro }}</p>
  }
</section>

<section class="login">
  <h2>Registar Novo Utilizador</h2>

  <input
    [(ngModel)]="username"
    name="username"
    placeholder="Username"
    type="text"
  />

  <input
    [(ngModel)]="password"
    name="password"
    placeholder="Password"
    type="password"
  />

  <button (click)="registar()">Registar</button>

  @if (erro) {
    <p class="erro">{{ erro }}</p>
  }
</section>
