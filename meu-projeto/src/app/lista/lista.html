<section class="lista">
    <h2>Lista de Conteúdos</h2>

    <div class="filtros">
        <input class="pesquisa" [(ngModel)]="textoPesquisa" placeholder="Pesquisar...">
        <select class="ordenacao" [(ngModel)]="criterioOrdenacao">
            <option value="titulo-az">A → Z</option>
            <option value="titulo-za">Z → A</option>
            <option value="visto">Visto</option>
            <option value="porVer">Por Ver</option>
        </select>
    </div>

    <ul>
        <li *ngFor="let conteudo of conteudosOrdenados" 
        [routerLink]="['/detalhe', conteudo.id]" class="item">
            <strong [ngClass]="{'visto': conteudo.estado === 'visto', 'porVer': conteudo.estado === 'porVer'}">
                {{ conteudo.titulo }}
            </strong>
            <div class="info">
                <span>Tipo: {{conteudo.tipo | titlecase}}</span>
                <span>Ano: {{conteudo.anoLancamento}}</span>
                <span>{{conteudo.avaliacao}}/10</span>
                <span>{{conteudo.estado === 'porVer' ? 'Por Ver' : (conteudo.estado | titlecase)}}</span>
            </div>
            <button class="botao-remover" (click)="remover($event, conteudo.id)">X</button>
        </li>
    </ul>
</section>
