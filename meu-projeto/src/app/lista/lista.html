<section class="lista">
    <div class="header-lista">
        <h2>Lista de Conteúdos</h2>
    </div>

    <div class="filtros">
        <input class="pesquisa" [(ngModel)]="textoPesquisa" placeholder="Pesquisar...">
        <select class="ordenacao" [(ngModel)]="criterioOrdenacao">
            <option value="titulo-az">A → Z</option>
            <option value="titulo-za">Z → A</option>
        </select>
    </div>

    <ul>
        <li *ngFor="let conteudo of conteudosOrdenados" 
            [routerLink]="['/detalhe', conteudo.id]" 
            class="item" 
            [ngClass]="{'visto': conteudo.estado === 'visto', 'porVer': conteudo.estado === 'porVer'}">
            <strong>{{ conteudo.titulo }}</strong>
            <span>Tipo: {{conteudo.tipo}} || Ano: {{conteudo.anoLancamento}} || Avaliação: {{conteudo.avaliacao}}/10 || Estado: {{conteudo.estado}}</span>
            <button class="botao-remover" (click)="remover($event, conteudo.id)">X</button>
        </li>
    </ul>
</section>
