<app-header></app-header>
<section class="lista">
    <div class="header-lista">
    <h2>Lista de Conteúdos</h2>
    <button class="btn-novo" routerLink="/media/new">Adicionar Novo</button>
    </div>

    <div class="filtros">
        <input class="pesquisa"[(ngModel)]="textoPesquisa" placeholder="Pesquisar...">
        <select class="ordenacao" [(ngModel)]="criterioOrdenacao">
            <option value="titulo-az">A -> Z</option>
            <option value="titulo-za">Z -> A</option>
        </select>
    </div>
    
    <ul>
        @for (conteudo of conteudos; track conteudo) {
            <li class="item" [ngClass]="conteudo.estado">
                <strong>{{ conteudo.titulo }}</strong>
                <span>{{conteudo.tipo}} || {{conteudo.anoLancamento}} || {{conteudo.avaliacao}}</span>
            </li>
           
        }
    </ul>
</section>
