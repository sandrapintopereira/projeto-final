<section class="lista">
    <h2>Lista de Conteúdos</h2>

    <button class="btn-novo" routerLink="/media/new">Adicionar Novo Conteúdo</button>

    <ul class="lista">
        @for (conteudo of conteudos; track conteudo) {
            <li class="item">{{ conteudo.titulo }}</li>
            <li class="item"> {{ conteudo.tipo }}</li>
            <li class="item"> {{ conteudo.estado }}</li>
            <li class="item"> {{ conteudo.avaliacao }}</li>
        }
    </ul>
</section>
