name: Vercel Production Deployment

on:
  push:
    branches:
      - feature/ci-pipeline

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: meu-projeto/package-lock.json

      - name: Install dependencies
        working-directory: meu-projeto
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate environment files
        run: |
          mkdir -p meu-projeto/src/environments

          cat > meu-projeto/src/environments/environment.ts <<EOF
          export const environment = {
            production: false,
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseKey: '${{ secrets.SUPABASE_KEY }}'
          };
          EOF

          cat > meu-projeto/src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseKey: '${{ secrets.SUPABASE_KEY }}'
          };
          EOF
            
      - name: Build Project
        working-directory: meu-projeto
        run: npx ng build --configuration production

      - name: Move build output
        run: |
          mkdir -p .vercel/output/static
          cp -r meu-projeto/dist/meu-projeto/browser/* .vercel/output/static/

      - name: Configure Vercel routing
        run: |
          cat > .vercel/output/config.json <<EOF
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
